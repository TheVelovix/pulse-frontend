name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /var/www/pulse-frontend
            cd /var/www/pulse-frontend
            git -c credential.helper= pull https://${{ secrets.GH_TOKEN }}@github.com/TheVelovix/pulse-frontend.git main
            cat > .env.local << EOF
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.BACKEND_URL }}
            NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.PADDLE_CLIENT_TOKEN }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}
            EOF
            sudo /root/.bun/bin/bun install
            sudo /root/.bun/bin/bun run build
            sudo systemctl restart pulse-frontend
