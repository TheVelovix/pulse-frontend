name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write env
        run: |
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" > .env.local
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.BACKEND_URL }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.PADDLE_CLIENT_TOKEN }}" >> .env.local
          echo "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}" >> .env.local

      - name: Copy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "./"
          target: /var/www/pulse-frontend
          overwrite: true
          exclude: "node_modules,.next,.git"

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/pulse-frontend &&
            /root/.bun/bin/bun install &&
            /root/.bun/bin/bun run build &&
            systemctl restart pulse-frontend
