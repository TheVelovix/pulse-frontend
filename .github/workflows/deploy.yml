name: Deploy to VPS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write env
        run: |
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" > .env.local
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.BACKEND_URL }}" >> .env.local
          echo "NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${{ secrets.PADDLE_CLIENT_TOKEN }}" >> .env.local
          echo "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }}" >> .env.local

      - name: Copy files
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" ./ root@${{ secrets.VPS_HOST }}:/var/www/pulse-frontend/

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "
            cd /var/www/pulse-frontend &&
            /root/.bun/bin/bun install &&
            /root/.bun/bin/bun run build &&
            systemctl restart pulse-frontend
          "
